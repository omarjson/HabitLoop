<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>HabitLoop</title>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="app-header">
      <h1 class="logo">Habit<span>Loop</span></h1>
      <nav class="top-nav" aria-label="Primary">
        <button data-view="today" class="nav-btn" aria-pressed="true">Today</button>
        <button data-view="stats" class="nav-btn" aria-pressed="false">Stats</button>
        <button data-view="insights" class="nav-btn" aria-pressed="false">Insights</button>
        <button data-view="settings" class="nav-btn" aria-pressed="false">Settings</button>
      </nav>
      <div class="header-actions">
        <span id="sync-status" class="sync-status" title="Sync status" aria-live="polite">offline</span>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">◐</button>
        <button id="lang-toggle" class="icon-btn" aria-label="Toggle language">EN</button>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <div id="view-root" aria-live="polite"></div>
    </main>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" aria-live="assertive"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
